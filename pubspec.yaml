name: awalingo
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  passkeys: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/
    - assets/onboarding/

  fonts:
    - family: Parkinsans
      fonts:
        - asset: assets/fonts/Parkinsans-Regular.ttf
          weight: 400
        - asset: assets/fonts/Parkinsans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Parkinsans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Parkinsans-Bold.ttf
          weight: 700

    - family: Metropolis
      fonts:
        - asset: assets/fonts/Metropolis-Regular.otf
          weight: 400
        - asset: assets/fonts/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Metropolis-Bold.otf
          weight: 700